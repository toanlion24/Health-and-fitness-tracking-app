openapi: 3.0.3
info:
  title: Health Fitness API
  version: 0.2.0
servers:
  - url: http://localhost:3000
paths:
  /api/v1/health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /api/v1/auth/register:
    post:
      summary: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        "201":
          description: Created
        "400":
          description: Validation error
        "409":
          description: Email already registered
  /api/v1/auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: OK
        "401":
          description: Invalid credentials
  /api/v1/auth/refresh:
    post:
      summary: Refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: OK
        "401":
          description: Invalid refresh token
  /api/v1/auth/logout:
    post:
      summary: Logout (revokes refresh token)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "204":
          description: No content
  /api/v1/me:
    get:
      summary: Current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
  /api/v1/me/profile:
    patch:
      summary: Update user profile (upsert)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                  nullable: true
                gender:
                  type: string
                  enum: [male, female, other]
                  nullable: true
                dob:
                  type: string
                  example: "1990-01-15"
                  nullable: true
                heightCm:
                  type: number
                  nullable: true
                activityLevel:
                  type: string
                  nullable: true
                timezone:
                  type: string
                  nullable: true
                locale:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Updated user payload (same shape as GET /me)
        "400":
          description: Validation error
        "401":
          description: Unauthorized
  /api/v1/me/goals:
    put:
      summary: Replace active goals with a new goal row
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [goalType]
              properties:
                goalType:
                  type: string
                  enum: [weight_loss, muscle_gain, maintenance]
                targetWeightKg:
                  type: number
                  nullable: true
                weeklyWorkoutTarget:
                  type: integer
                  nullable: true
                dailyKcalTarget:
                  type: integer
                  nullable: true
                startDate:
                  type: string
                  example: "2026-01-01"
                  nullable: true
                targetDate:
                  type: string
                  example: "2026-12-31"
                  nullable: true
                isActive:
                  type: boolean
      responses:
        "200":
          description: Updated user payload (same shape as GET /me)
        "400":
          description: Validation error
        "401":
          description: Unauthorized
  /api/v1/exercises:
    get:
      summary: List exercise catalog (Phase 1)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: muscleGroup
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        "200":
          description: Array of exercises
        "401":
          description: Unauthorized
  /api/v1/workout-plans:
    get:
      summary: List workout plans
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: include
          schema:
            type: string
            enum: [exercises]
      responses:
        "200":
          description: OK
    post:
      summary: Create workout plan
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
      responses:
        "201":
          description: Created
  /api/v1/workout-sessions:
    get:
      summary: List workout sessions
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: from
          schema:
            type: string
            example: "2026-04-01"
        - in: query
          name: to
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: OK
    post:
      summary: Create workout session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionDate]
              properties:
                planId:
                  type: integer
                  nullable: true
                sessionDate:
                  type: string
                  example: "2026-04-14"
                notes:
                  type: string
                  nullable: true
      responses:
        "201":
          description: Created
  /api/v1/foods:
    get:
      summary: Search food catalog
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: OK
  /api/v1/meal-logs:
    get:
      summary: Meal logs for a calendar day (UTC)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: date
          required: true
          schema:
            type: string
            example: "2026-04-14"
      responses:
        "200":
          description: OK
    post:
      summary: Create meal log
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mealType, loggedAt]
              properties:
                mealType:
                  type: string
                  enum: [breakfast, lunch, dinner, snack]
                loggedAt:
                  type: string
                  format: date-time
      responses:
        "201":
          description: Created
  /api/v1/body-metrics:
    get:
      summary: List body metric entries in date range
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: from
          required: true
          schema:
            type: string
        - in: query
          name: to
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
    post:
      summary: Create body metric log
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recordedAt]
              properties:
                recordedAt:
                  type: string
                  format: date-time
                weightKg:
                  type: number
                  nullable: true
      responses:
        "201":
          description: Created
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
