openapi: 3.0.3
info:
  title: Health Fitness API
  version: 0.1.0
servers:
  - url: http://localhost:3000
paths:
  /api/v1/health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /api/v1/auth/register:
    post:
      summary: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        "201":
          description: Created
        "400":
          description: Validation error
        "409":
          description: Email already registered
  /api/v1/auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: OK
        "401":
          description: Invalid credentials
  /api/v1/auth/refresh:
    post:
      summary: Refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: OK
        "401":
          description: Invalid refresh token
  /api/v1/auth/logout:
    post:
      summary: Logout (revokes refresh token)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "204":
          description: No content
  /api/v1/me:
    get:
      summary: Current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
  /api/v1/me/profile:
    patch:
      summary: Update user profile (upsert)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                  nullable: true
                gender:
                  type: string
                  enum: [male, female, other]
                  nullable: true
                dob:
                  type: string
                  example: "1990-01-15"
                  nullable: true
                heightCm:
                  type: number
                  nullable: true
                activityLevel:
                  type: string
                  nullable: true
                timezone:
                  type: string
                  nullable: true
                locale:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Updated user payload (same shape as GET /me)
        "400":
          description: Validation error
        "401":
          description: Unauthorized
  /api/v1/me/goals:
    put:
      summary: Replace active goals with a new goal row
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [goalType]
              properties:
                goalType:
                  type: string
                  enum: [weight_loss, muscle_gain, maintenance]
                targetWeightKg:
                  type: number
                  nullable: true
                weeklyWorkoutTarget:
                  type: integer
                  nullable: true
                dailyKcalTarget:
                  type: integer
                  nullable: true
                startDate:
                  type: string
                  example: "2026-01-01"
                  nullable: true
                targetDate:
                  type: string
                  example: "2026-12-31"
                  nullable: true
                isActive:
                  type: boolean
      responses:
        "200":
          description: Updated user payload (same shape as GET /me)
        "400":
          description: Validation error
        "401":
          description: Unauthorized
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
